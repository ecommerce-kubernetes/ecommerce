services:
  config-service:
    container_name: config-service
    build:
      context: ./config-service
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
    - SPRING_PROFILES_ACTIVE=dev
    - GITHUB_USERNAME=${GITHUB_USERNAME}
    - GITHUB_TOKEN=${GITHUB_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - buynest-network
  
  discovery-service:
    container_name: discovery-service
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on: 
      config-service:
        condition: service_healthy
    networks:
      - buynest-network
  
  user-service:
    container_name: user-service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx512m
    depends_on:
      config-service: 
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - buynest-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  
  product-service:
    container_name: product-service
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx512m
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - buynest-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  
  order-service:
    container_name: order-service
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:    
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - buynest-network
    
  gateway-service:
    container_name: gateway-service
    build: 
      context: ./gateway-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - buynest-network
      
networks:
  buynest-network:
    external: true